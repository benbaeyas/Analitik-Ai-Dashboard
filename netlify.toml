[build]
  # Root folder berisi index.html langsung (tidak ada build step)
  publish = "."
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "GROQ_MODEL"

# Redirect /api/ai ke Netlify Function
[[redirects]]
  from = "/api/ai"
  to   = "/.netlify/functions/ai"
  status = 200  